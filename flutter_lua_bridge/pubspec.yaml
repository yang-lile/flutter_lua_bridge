name: flutter_lua_bridge
description: "Flutter Lua FFI bridge with compile-time version selection via Native Assets."
version: 0.0.1

environment:
  sdk: ^3.11.1

dependencies:
  code_assets: ^1.0.0
  hooks: ^1.0.0
  logging: ^1.3.0
  native_toolchain_c: ^0.17.4
  path: ^1.9.0

dev_dependencies:
  ffi: ^2.1.4
  ffigen: ^20.1.1
  flutter_lints: ^6.0.0
  test: ^1.28.0

hooks:
  user_defines:
    flutter_lua_bridge:
      lua_version: "5.4"
      lua_source_url: "https://www.lua.org/ftp/lua-5.4.7.tar.gz"
