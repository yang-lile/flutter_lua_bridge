name: flutter_lua_shim
description: Flutter Lua FFI bridge with compile-time version selection via Native Assets.
version: 1.0.0
repository: https://github.com/yourname/flutter_lua_shim

resolution: workspace

environment:
  sdk: '>=3.10.0 <4.0.0'
  flutter: '>=3.38.0'

dependencies:
  ffi: ^2.1.2
  hooks: ^1.0.1
  native_toolchain_c: ^0.17.4
  path: ^1.9.0

dev_dependencies:
  ffigen: ^20.1.1
  lints: ^6.1.0
  test: ^1.25.8
  yaml: ^3.1.2

hooks:
  user_defines:
    flutter_lua_shim:
      lua_version: "5.4"
